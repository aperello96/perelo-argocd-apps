---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: metabase-secrets
  namespace: data-analys
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: metabase-secrets
    creationPolicy: Owner
  data:
    - secretKey: MB_DB_USER
      remoteRef:
        key: apps/data-analys/metabase
        property: MB_DB_USER
    - secretKey: MB_DB_PASS
      remoteRef:
        key: apps/data-analys/metabase
        property: MB_DB_PASS

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: data-analys
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metabase
  template:
    metadata:
      labels:
        app: metabase
    spec:
      containers:
        - name: metabase-app
          image: metabase/metabase:v0.58.7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: MB_DB_TYPE
              value: mysql
            - name: MB_DB_DBNAME
              value: metabase
            - name: MB_DB_PORT
              value: "3306"
            - name: MB_DB_USER
              valueFrom:
                secretKeyRef:
                  name: metabase-secrets
                  key: MB_DB_USER
            - name: MB_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: metabase-secrets
                  key: MB_DB_PASS
            - name: MB_DB_HOST
              value: mysql.data-analys.svc.cluster.local

---
apiVersion: v1
kind: Service
metadata:
  name: metabase-service
  namespace: data-analys
spec:
  selector:
    app: metabase
  ports:
    - name: http-web
      port: 80
      targetPort: 3000
  type: ClusterIP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: metabase
  namespace: data-analys
spec:
  host: metabase.apps.okd.pro.perelohome.com
  to:
    kind: Service
    name: metabase-service
    weight: 100
  port:
    targetPort: http-web
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
