---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: mongodb-selfsigned
  namespace: tripted-staging
spec:
  selfSigned: {}

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mongodb-ca
  namespace: tripted-staging
spec:
  isCA: true
  commonName: mongodb-ca.tripted-staging
  secretName: mongodb-ca-key-pair
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: mongodb-selfsigned
    kind: Issuer

---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: mongodb-ca-issuer
  namespace: tripted-staging
spec:
  ca:
    secretName: mongodb-ca-key-pair

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mongodb-server
  namespace: tripted-staging
spec:
  secretName: mongodb-server-tls
  privateKey:
    algorithm: RSA
    size: 2048
  dnsNames:
    - mongodb-svc
    - mongodb-svc.tripted-staging.svc
    - mongodb-svc.tripted-staging.svc.cluster.local
    - '*.mongodb-svc.tripted-staging.svc.cluster.local'
    - db-node-1.local.perelohome.com
    - db-node-2.local.perelohome.com
    - db-node-3.local.perelohome.com
  issuerRef:
    name: mongodb-ca-issuer
    kind: Issuer